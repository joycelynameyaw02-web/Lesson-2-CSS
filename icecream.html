<!DOCTYPE html>
<html>
<head>
    <title>My Ice Cream Shop Menu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fff4f8;
            text-align: center;
            color: #4a2c2a;
        }
        h1 {
            color: #d63384;
            font-size: 36px;
        }
        h1 + p {
            color: #8a2be2;
            font-weight: bold;
            background-color: #ffe3f1;
            border-radius: 10px;
        }
        .shop-description {
            font-size: 36px;
            color: #ff1493;
            font-weight: bold;
        }
        .menu-box {
            width: 420px;
            background-color: white;
            border: 3px solid #ff69b4;
            border-radius: 15px;
            margin: 20px auto;
            padding: 20px;
        }
        ul {
            padding: 0;
        }
        ul > li {
            list-style-type: none;
            background-color: #fff0f5;
            color: #5c2a4a;
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #ffb6c1;
        }
        ul > li:nth-child(3) {
            background-color: #fff3cd;
            color: #b85c00;
            border: 2px solid #ffa500;
        }
        ul > li:hover {
            background-color: #ff69b4;
            color: white;
            cursor: pointer;
            transform: scale(1.05);
        }
        button {
            background-color: #d63384;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background-color: #8a2be2;
        }
    </style>
</head>
<body>
   <h1>My Ice Cream Shop Menu</h1>
   <p>Welcome to Scoops of Joy!</p>
   <p class="shop-description">
    We serve colourful, creamy, and delicious ice cream flavours
   </p>
   <div class="menu-box">
    <h2>Our Ice Cream Flavours</h2>
    <ul>
     <li>Vanilla Dream</li>
     <li>Chocolate Delight</li>
     <li>Strawberry Swirl</li>
     <li>Blueberry Blast</li>
    <li>Mango Magic - Today's Special</li>
    </ul>
    <button>Order Now</button>
   </div>
</body>
</html>
